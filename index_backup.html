<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Newsletter Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #e0e7ff 0%, #fce7f3 50%, #ede9fe 100%);
    }

    /* ── Background gradient rotation layers ─────────── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .bg-pentaprism { background: linear-gradient(180deg, #e0e7ff 0%, #ddd6fe 50%, #ede9fe 100%); }
    .bg-shout      { background: linear-gradient(90deg,  #fce7f3 0%, #ffe4e6 50%, #fecdd3 100%); }
    .bg-bluehole   { background: linear-gradient(225deg, #e0f2fe 0%, #dbeafe 50%, #bae6fd 100%); }

    body[data-hover="pentaprism"] .bg-pentaprism { opacity: 1; }
    body[data-hover="shout"]      .bg-shout      { opacity: 1; }
    body[data-hover="bluehole"]   .bg-bluehole   { opacity: 1; }

    /* ── Floating particles ──────────────────────────── */
    .particle {
      position: fixed;
      border-radius: 50%;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      /* margin-left/margin-top used as scatter offset (animatable) */
      margin-left: 0px;
      margin-top: 0px;
      transition: background 0.8s ease,
                  border-radius 0.8s ease,
                  margin-left 0.7s cubic-bezier(0.22,1,0.36,1),
                  margin-top 0.7s cubic-bezier(0.22,1,0.36,1),
                  opacity 0.6s ease;
    }
    /* Default: muted mixed colors */
    .p1  { width: 180px; height: 180px; background: #c4b5fd; top: 8%;  left: 5%;  animation: float1 14s ease-in-out infinite; }
    .p2  { width: 120px; height: 120px; background: #fecdd3; top: 15%; right: 10%; animation: float2 18s ease-in-out infinite; }
    .p3  { width: 200px; height: 200px; background: #bae6fd; bottom: 12%; left: 12%; animation: float3 16s ease-in-out infinite; }
    .p4  { width: 90px;  height: 90px;  background: #ddd6fe; bottom: 20%; right: 8%;  animation: float1 20s ease-in-out infinite reverse; }
    .p5  { width: 140px; height: 140px; background: #fbcfe8; top: 50%;  left: 60%;  animation: float2 15s ease-in-out infinite; border-radius: 30%; }
    .p6  { width: 100px; height: 100px; background: #a5b4fc; top: 60%;  left: 3%;   animation: float3 22s ease-in-out infinite reverse; border-radius: 35%; }
    .p7  { width: 160px; height: 160px; background: #fda4af; top: 5%;   right: 35%; animation: float1 17s ease-in-out infinite; opacity: 0.12; }

    /* Hover: shift all particles to panel theme color */
    body[data-hover="pentaprism"] .particle { background: #a5b4fc; }
    body[data-hover="shout"]      .particle { background: #fda4af; }
    body[data-hover="bluehole"]   .particle { background: #7dd3fc; }

    /* Hover: scatter — each particle offsets in a different direction */
    body[data-hover] .particle { border-radius: 50%; opacity: 0.25; }
    body[data-hover] .p1 { margin-left: -50px; margin-top: -40px; }
    body[data-hover] .p2 { margin-left: 45px;  margin-top: -35px; }
    body[data-hover] .p3 { margin-left: -40px; margin-top: 50px;  }
    body[data-hover] .p4 { margin-left: 55px;  margin-top: 40px;  }
    body[data-hover] .p5 { margin-left: 35px;  margin-top: -50px; }
    body[data-hover] .p6 { margin-left: -55px; margin-top: 30px;  }
    body[data-hover] .p7 { margin-left: 40px;  margin-top: 45px;  }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33%      { transform: translate(30px, -40px) rotate(8deg); }
      66%      { transform: translate(-20px, 20px) rotate(-5deg); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33%      { transform: translate(-35px, 25px) rotate(-10deg); }
      66%      { transform: translate(25px, -30px) rotate(6deg); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33%      { transform: translate(20px, 35px) rotate(12deg); }
      66%      { transform: translate(-30px, -20px) rotate(-8deg); }
    }

    /* ── Webtoon Panel Container ─────────────────────── */
    .panel-box {
      position: relative;
      width: min(720px, 90vmin);
      height: min(720px, 90vmin);
      border-radius: 32px;
      overflow: hidden;
    }

    /* ── Each panel (diagonal slice) ─────────────────── */
    .panel {
      position: absolute;
      inset: 0;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      transition:
        filter 0.4s cubic-bezier(0.22,1,0.36,1),
        clip-path 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    /* ── Diagonal clip-paths: default ────────────────── */
    .panel-pentaprism {
      clip-path: polygon(0 0, 100% 0, 68% 38%, 0 34%);
      background: linear-gradient(145deg, #6366f1 0%, #4338ca 60%, #312e81 100%);
      z-index: 3;
    }
    .panel-shout {
      clip-path: polygon(0 36%, 70% 39%, 100% 0, 100% 72%, 36% 68%, 0 100%);
      background: linear-gradient(145deg, #fb7185 0%, #e11d48 60%, #9f1239 100%);
      z-index: 2;
    }
    .panel-bluehole {
      clip-path: polygon(0 100%, 38% 70%, 100% 74%, 100% 100%);
      background: linear-gradient(145deg, #38bdf8 0%, #0284c7 60%, #075985 100%);
      z-index: 1;
    }

    /* ── Hover: dim siblings + expand hovered panel ─── */
    .panel-box:hover .panel { filter: brightness(0.50); }
    .panel-box:hover .panel:hover { filter: brightness(1.08); }
    .panel:active { filter: brightness(0.95) !important; }

    /* Expanded clip-paths on hover: each panel grows ~4% into neighbor */
    .panel-box:hover .panel-pentaprism:hover {
      clip-path: polygon(0 0, 100% 0, 68% 42%, 0 38%);
    }
    .panel-box:hover .panel-shout:hover {
      clip-path: polygon(0 32%, 70% 35%, 100% 0, 100% 76%, 36% 72%, 0 100%);
    }
    .panel-box:hover .panel-bluehole:hover {
      clip-path: polygon(0 100%, 38% 66%, 100% 70%, 100% 100%);
    }

    /* ── Panel content (absolute within visible clip region) ── */
    .panel-content {
      position: absolute;
      z-index: 2;
    }
    .panel-pentaprism .panel-content {
      top: 8%;
      left: 48px;
    }
    .panel-shout .panel-content {
      top: 48%;
      left: 50%;
      transform: translateX(-50%);
    }
    .panel-bluehole .panel-content {
      bottom: 6%;
      right: 48px;
      text-align: right;
    }

    .panel-name {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.25);
    }
    .panel-desc {
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.75;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    /* ── Arrow indicator ─────────────────────────────── */
    .panel-arrow {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 12px;
      padding: 6px 16px 6px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.35s, transform 0.35s cubic-bezier(0.22,1,0.36,1);
    }
    .panel:hover .panel-arrow {
      opacity: 1;
      transform: translateX(0);
    }
    /* bluehole: arrow slides from right */
    .panel-bluehole .panel-arrow {
      transform: translateX(8px);
    }
    .panel-bluehole:hover .panel-arrow {
      transform: translateX(0);
    }
    .panel-arrow svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Decorative circles ──────────────────────────── */
    .panel-deco {
      position: absolute;
      border-radius: 50%;
      opacity: 0.10;
      pointer-events: none;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1), opacity 0.6s;
    }
    .panel:hover .panel-deco {
      transform: scale(1.2);
      opacity: 0.18;
    }
    .panel-pentaprism .deco-1 {
      width: 240px; height: 240px;
      background: #a5b4fc;
      top: -70px; right: 60px;
    }
    .panel-shout .deco-1 {
      width: 260px; height: 260px;
      background: #fda4af;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .panel-shout:hover .deco-1 {
      transform: translate(-50%, -50%) scale(1.2);
    }
    .panel-bluehole .deco-1 {
      width: 220px; height: 220px;
      background: #7dd3fc;
      bottom: -50px; left: 100px;
    }

    /* ── Entry animation ─────────────────────────────── */
    @keyframes panel-enter {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .panel {
      opacity: 0;
      animation: panel-enter 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .panel-pentaprism { animation-delay: 0.1s; }
    .panel-shout      { animation-delay: 0.25s; }
    .panel-bluehole   { animation-delay: 0.4s; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 480px) {
      .panel-pentaprism .panel-content { left: 24px; }
      .panel-bluehole .panel-content { right: 24px; }
      .panel-name { font-size: 20px; }
      .panel-desc { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="bg-layer bg-pentaprism"></div>
  <div class="bg-layer bg-shout"></div>
  <div class="bg-layer bg-bluehole"></div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>
  <div class="particle p7"></div>

  <div class="panel-box">
    <!-- 펜타프리즘 (상단) -->
    <a class="panel panel-pentaprism" href="pentaprism.html">
      <div class="panel-deco deco-1"></div>
      <div class="panel-content">
        <div class="panel-name">PENTAPRISM</div>
        <div class="panel-desc">펜타브리드 소식과 프로젝트를 전하는 대표 뉴스레터</div>
        <div class="panel-arrow">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          편집하기
        </div>
      </div>
    </a>

    <!-- 샤우트 (중앙) -->
    <a class="panel panel-shout" href="shout.html">
      <div class="panel-deco deco-1"></div>
      <div class="panel-content">
        <div class="panel-name">SHOUT</div>
        <div class="panel-desc">트렌드와 인사이트를 전하는 뉴스레터</div>
        <div class="panel-arrow">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          편집하기
        </div>
      </div>
    </a>

    <!-- 블루홀미팅 (하단) -->
    <a class="panel panel-bluehole" href="bluehole.html">
      <div class="panel-deco deco-1"></div>
      <div class="panel-content">
        <div class="panel-name">BLUEHOLE MEETING</div>
        <div class="panel-desc">글로벌 트렌드와 미팅 소식을 전하는 뉴스레터</div>
        <div class="panel-arrow">
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          편집하기
        </div>
      </div>
    </a>
  </div>
<script>
  document.querySelectorAll('.panel').forEach(panel => {
    const key = panel.classList.contains('panel-pentaprism') ? 'pentaprism'
              : panel.classList.contains('panel-shout') ? 'shout'
              : 'bluehole';
    panel.addEventListener('mouseenter', () => { document.body.dataset.hover = key; });
    panel.addEventListener('mouseleave', () => { delete document.body.dataset.hover; });
  });
</script>
</body>
</html>
